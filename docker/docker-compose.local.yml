version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env.local
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PATH=/app/data/chroma
    volumes:
      - ../projects:/app/projects
      - ../logs:/app/logs
      - chroma_data:/app/data/chroma
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A core.task_queue.celery_app worker --loglevel=info -Q agents
    env_file:
      - ../.env.local
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PATH=/app/data/chroma
    volumes:
      - ../projects:/app/projects
      - ../logs:/app/logs
      - chroma_data:/app/data/chroma
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
  sqlite_data:
